name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'build_number.txt'
      - '.github/**'
      - '**.md'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bump build number
        id: bump
        run: |
          BUILD=$(cat build_number.txt | tr -d '[:space:]')
          NEW=$((BUILD + 1))
          echo $NEW > build_number.txt
          echo "version_code=$NEW" >> $GITHUB_OUTPUT
          echo "version_name=1.0.$NEW" >> $GITHUB_OUTPUT
          echo "tag=v1.0.$NEW" >> $GITHUB_OUTPUT

      - name: Commit bumped build number
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add build_number.txt
          git commit -m "ci: bump build to ${{ steps.bump.outputs.version_code }} [skip ci]"
          git push

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew :hubapp:assembleDebug :clientapp:assembleDebug --no-daemon

      - name: Delete existing release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.bump.outputs.tag }}
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

      - name: Create GitHub Release and upload APKs
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.bump.outputs.tag }}
          VERSION_NAME=${{ steps.bump.outputs.version_name }}
          gh release create "$TAG" \
            hubapp/build/outputs/apk/debug/hubapp-debug.apk#photosync-hub.apk \
            clientapp/build/outputs/apk/debug/clientapp-debug.apk#photosync-client.apk \
            --title "PhotoSync $VERSION_NAME" \
            --notes "Automated build — versionCode ${{ steps.bump.outputs.version_code }}"

      - name: Register hub and client with update portal
        run: |
          VERSION_CODE=${{ steps.bump.outputs.version_code }}
          VERSION_NAME=${{ steps.bump.outputs.version_name }}
          TAG=${{ steps.bump.outputs.tag }}
          REPO="${{ github.repository }}"
          HUB_URL="https://github.com/${REPO}/releases/download/${TAG}/photosync-hub.apk"
          CLIENT_URL="https://github.com/${REPO}/releases/download/${TAG}/photosync-client.apk"
          PORTAL="https://app-updates.mcubittbuilders.workers.dev"

          echo "Registering hub v${VERSION_CODE}..."
          curl -sf -X POST "${PORTAL}/upload/hub" \
            -H "X-Upload-Key: ${{ secrets.UPLOAD_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\": ${VERSION_CODE}, \"versionName\": \"${VERSION_NAME}\", \"apkUrl\": \"${HUB_URL}\"}"

          echo "Registering client v${VERSION_CODE}..."
          curl -sf -X POST "${PORTAL}/upload/client" \
            -H "X-Upload-Key: ${{ secrets.UPLOAD_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\": ${VERSION_CODE}, \"versionName\": \"${VERSION_NAME}\", \"apkUrl\": \"${CLIENT_URL}\"}"

          echo "Done — portal updated to v${VERSION_NAME}"
