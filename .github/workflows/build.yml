name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/**'
      - '**.md'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build APKs
        run: ./gradlew :hubapp:assembleDebug :clientapp:assembleDebug --no-daemon -PversionCode=$(( ${{ github.run_number }} + 200 )) -PversionName=1.0.$(( ${{ github.run_number }} + 200 ))

      - name: Create GitHub Release and upload APKs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VC=$(( ${{ github.run_number }} + 200 ))
          VN=1.0.$(( ${{ github.run_number }} + 200 ))
          TAG="v${VC}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            hubapp/build/outputs/apk/debug/hubapp-debug.apk \
            clientapp/build/outputs/apk/debug/clientapp-debug.apk \
            --title "PhotoSync $VN" \
            --notes "Build $VC"

      - name: Register hub and client with update portal
        run: |
          VC=$(( ${{ github.run_number }} + 200 ))
          VN=1.0.$(( ${{ github.run_number }} + 200 ))
          TAG="v${VC}"
          REPO="${{ github.repository }}"
          HUB_URL="https://github.com/${REPO}/releases/download/${TAG}/hubapp-debug.apk"
          CLIENT_URL="https://github.com/${REPO}/releases/download/${TAG}/clientapp-debug.apk"
          PORTAL="https://app-updates.mcubittbuilders.workers.dev"
          curl -sf -X POST "${PORTAL}/upload/hub" \
            -H "X-Upload-Key: ${{ secrets.UPLOAD_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\": $VC, \"versionName\": \"$VN\", \"apkUrl\": \"$HUB_URL\"}"
          curl -sf -X POST "${PORTAL}/upload/client" \
            -H "X-Upload-Key: ${{ secrets.UPLOAD_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"versionCode\": $VC, \"versionName\": \"$VN\", \"apkUrl\": \"$CLIENT_URL\"}"
